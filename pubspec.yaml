name: mapp_ar
description: Mapp AR - Flutter + Mapbox smart map and simulated AR navigation app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

flutter:
  uses-material-design: true
  assets:
    - .env

dependencies:
  flutter:
    sdk: flutter
  mapbox_maps_flutter: ^2.25.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_compass: ^0.8.1
  dio: ^5.8.0+1
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.5
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
